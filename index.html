<script>
(function() {

const PLAYLIST_ID = 'PLOu--yZWWSogumQEMxLeEEtjIOT-7QAcW';
const container = document.getElementById('dynamic-video-container');

const seoVibe = [
    { genre:'PHONK', mood:'NOCTURNAL', tech:'HIGH-BASS', context:'DRIFT' },
    { genre:'WAVE', mood:'ATMOSPHERIC', tech:'SYNTH-DRIVEN', context:'NEON' },
    { genre:'DRIFT', mood:'RAW ENERGY', tech:'STREET AUDIO', context:'URBAN' },
    { genre:'DARK', mood:'IMMERSIVE', tech:'LOW-FI', context:'CYBER' }
];

async function fetchVideos(){

const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?playlist_id=${PLAYLIST_ID}`)}`);
const data = await res.json();
const xml = new DOMParser().parseFromString(data.contents,"text/xml");
const entries = xml.getElementsByTagName("entry");

container.innerHTML = '';

const structuredData = [];

for(let i=0;i<entries.length;i++){

const e = entries[i];
const title = e.getElementsByTagName("title")[0].textContent;
const videoId = e.getElementsByTagName("yt:videoId")[0].textContent;
const pubDateRaw = e.getElementsByTagName("published")[0].textContent;
const pubDate = new Date(pubDateRaw).toLocaleDateString('it-IT');

const vibe = seoVibe[i % seoVibe.length];

/* DESCRIZIONE DINAMICA */
const variations = [
`Exclusive ${vibe.mood} ${vibe.genre} session driven by ${vibe.tech} textures and ${vibe.context} atmosphere.`,
`${vibe.genre} experience with ${vibe.mood} vibes built on ${vibe.tech} sound design and ${vibe.context} aesthetics.`,
`${vibe.mood} ${vibe.genre} journey exploring ${vibe.tech} elements in a ${vibe.context} environment.`,
`Deep dive into ${vibe.genre} sound: ${vibe.mood} mood, ${vibe.tech} structure, ${vibe.context} visuals.`
];

const metaDesc = variations[i % variations.length];

/* TAG */
const tagList = [
"100 OTTANI",
vibe.genre,
vibe.mood,
vibe.tech.replace('-',' '),
vibe.context
];

structuredData.push({
"@context":"https://schema.org",
"@type":"VideoObject",
"name":title,
"description":metaDesc,
"thumbnailUrl":[`https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`],
"uploadDate":pubDateRaw,
"embedUrl":`https://www.youtube.com/embed/${videoId}`
});

const sizeClass = (i%3===0)?'w-60':(i%3===1)?'w-40':'w-50';

const article = document.createElement('article');
article.className=`pc-card ${sizeClass}`;

article.innerHTML=`
<a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">
<div class="pc-thumb-container">
<div class="pc-thumb" style="background-image:url('https://i.ytimg.com/vi/${videoId}/mqdefault.jpg')"></div>
</div>
<div class="pc-meta-strip">
<span>SERIAL: <b>${videoId}</b></span>
<span>DATE: <b>${pubDate}</b></span>
</div>
<div class="pc-content">
<h2 class="pc-title">${title}</h2>
<p>${metaDesc}</p>
<div class="pc-tag-list">
${tagList.map(t=>`<span class="tag-box">${t}</span>`).join('')}
</div>
<div class="corner-arrow">
<svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
</div>
</div>
</a>`;

container.appendChild(article);
}

const scriptSEO = document.createElement('script');
scriptSEO.type='application/ld+json';
scriptSEO.textContent = JSON.stringify(structuredData);
document.body.appendChild(scriptSEO);

}

fetchVideos();

})();
</script>
