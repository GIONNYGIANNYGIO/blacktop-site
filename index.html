<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacktop Sessions - 100 Ottani Please!™</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            font-family: 'JetBrains Mono', monospace;
        }

        #podcast-terminal-blacktop {
            --bt-neon: #FFFF00;
            --bt-white: #ffffff;
            --bt-border: rgba(255, 255, 255, 0.12);
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            width: 100%;
        }

        /* HEADER */
        .bt-magazine-header { 
            padding: 100px 0 40px;
            display: flex; 
            flex-direction: column;
        }
        .bt-brand-stack { margin-bottom: 40px; }
        .bt-title-main, .bt-title-outline { 
            font-family: 'Monument Extended', sans-serif !important;
            font-size: clamp(3.5rem, 12vw, 11rem); 
            line-height: 0.85; margin: 0; 
            text-transform: uppercase; 
        }
        .bt-title-outline { 
            color: transparent; 
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.3); 
        }
        .bt-full-divider { width: 100%; height: 1px; background: rgba(255, 255, 255, 0.1); margin-bottom: 30px; }
        .bt-editorial-text {
            font-size: 11px; line-height: 1.8; color: rgba(255, 255, 255, 0.5); 
            text-transform: uppercase; text-align: right; max-width: 520px; margin-left: auto;
        }
        .bt-editorial-text b { color: var(--bt-neon); }

        /* GRID */
        .podcast-archive-grid { display: flex; flex-wrap: wrap; gap: 20px; }

        /* CARDS */
        .pc-card { 
            position: relative; background: #000; border: 1px solid var(--bt-border); 
            display: flex; flex-direction: column; transition: 0.4s; text-decoration: none; color: inherit; 
        }
        .w-60 { flex: 1 1 calc(60% - 10px); }
        .w-40 { flex: 1 1 calc(40% - 10px); }
        .w-50 { flex: 1 1 calc(50% - 10px); }
        .pc-thumb-container { aspect-ratio: 16/9; overflow: hidden; border-bottom: 1px solid var(--bt-border); }
        .pc-thumb { width: 100%; height: 100%; background-size: cover; background-position: center; transition: 0.6s; }
        .pc-card:hover .pc-thumb { filter: grayscale(1); transform: scale(1.05); }
        .pc-card:hover { border-color: var(--bt-neon); }

        .pc-meta-strip { display: flex; justify-content: space-between; padding: 12px 20px 0; font-size: 9px; color: rgba(255, 255, 255, 0.2); }
        .pc-content { padding: 15px 20px 20px; }
        .pc-title { font-family: 'Monument Extended' !important; font-size: 16px; margin-bottom: 12px; text-transform: uppercase; }
        .pc-tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag-box { font-size: 8px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 2px 6px; font-weight: 800; }

        .corner-arrow { position: absolute; bottom: 20px; right: 20px; width: 15px; opacity: 0.3; transition: 0.3s; }
        .corner-arrow svg { width: 100%; stroke: var(--bt-neon); stroke-width: 3; fill: none; transform: rotate(90deg); }

        /* LOADER SOTTO AL CENTRO */
        #loader-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 50px 0 100px;
        }
        .loader-spin {
            width: 35px; height: 35px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--bt-neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .w-60, .w-40, .w-50 { flex: 1 1 100%; }
            .bt-title-main, .bt-title-outline { font-size: 12vw !important; }
        }
    </style>
</head>
<body>

<div id="podcast-terminal-blacktop">
    <header class="bt-magazine-header">
        <div class="bt-brand-stack">
            <h1 class="bt-title-main">BLACKTOP</h1>
            <h1 class="bt-title-outline">SESSIONS</h1>
        </div>
        <div class="bt-full-divider"></div>
        <p class="bt-editorial-text">THE UNDERGROUND <b>PHONK & WAVE</b> ARCHIVE. POWERED BY <b>100 OTTANI</b>.</p>
    </header>

    <div id="dynamic-video-container" class="podcast-archive-grid"></div>

    <div id="loader-container">
        <div class="loader-spin"></div>
    </div>
</div>

<script>
(function() {
    const API_KEY = 'AIzaSyCzyvtdHpYvKnRT3iGNXY5UwFwYba6OyPk';
    const PLAYLIST_ID = 'PLOu--yZWWSogumQEMxLeEEtjIOT-7QAcW';
    const container = document.getElementById('dynamic-video-container');
    const loader = document.getElementById('loader-container');

    const seoVibe = [
        { genre: 'PHONK', mood: 'NOCTURNAL', tech: 'HIGH-BASS', context: 'DRIFT' },
        { genre: 'WAVE', mood: 'ATMOSPHERIC', tech: 'SYNTH-DRIVEN', context: 'NEON' },
        { genre: 'DRIFT', mood: 'RAW ENERGY', tech: 'STREET AUDIO', context: 'URBAN' },
        { genre: 'DARK', mood: 'IMMERSIVE', tech: 'LOW-FI', context: 'CYBER' }
    ];

    async function fetchYouTube() {
        try {
            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=20&playlistId=${PLAYLIST_ID}&key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();

            if (!data.items) return;

            container.innerHTML = '';
            data.items.forEach((item, i) => {
                const vid = item.snippet.resourceId.videoId;
                const title = item.snippet.title;
                const date = new Date(item.snippet.publishedAt).toLocaleDateString('it-IT');
                const vibe = seoVibe[i % seoVibe.length];
                const sizeClass = (i % 3 === 0) ? 'w-60' : (i % 3 === 1) ? 'w-40' : 'w-50';

                const article = document.createElement('article');
                article.className = `pc-card ${sizeClass}`;
                article.innerHTML = `
                    <a href="https://www.youtube.com/watch?v=${vid}" target="_blank">
                        <div class="pc-thumb-container">
                            <div class="pc-thumb" style="background-image:url('https://i.ytimg.com/vi/${vid}/mqdefault.jpg')"></div>
                        </div>
                        <div class="pc-meta-strip">
                            <span>SERIAL: <b>${vid}</b></span>
                            <span>DATE: <b>${date}</b></span>
                        </div>
                        <div class="pc-content">
                            <h2 class="pc-title">${title}</h2>
                            <div class="pc-tag-list">
                                <span class="tag-box">100 OTTANI</span>
                                <span class="tag-box">${vibe.genre}</span>
                                <span class="tag-box">${vibe.mood}</span>
                            </div>
                            <div class="corner-arrow">
                                <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                            </div>
                        </div>
                    </a>`;
                container.appendChild(article);
            });
            loader.style.display = 'none';
        } catch (e) { console.error(e); }
    }
    fetchYouTube();
})();
</script>
</body>
</html>
