<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacktop Sessions - 100 Ottani Please!™</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        body { margin: 0; background-color: #000; color: #fff; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        
        #main-container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }

        /* HEADER */
        .bt-header { padding: 100px 0 40px; display: flex; flex-direction: column; }
        .bt-title { font-family: 'Monument Extended', sans-serif; font-size: clamp(3.5rem, 12vw, 11rem); line-height: 0.85; margin: 0; text-transform: uppercase; }
        .bt-outline { color: transparent; -webkit-text-stroke: 1.5px rgba(255,255,255,0.3); }
        .bt-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 30px 0; }
        .bt-info { font-size: 11px; color: rgba(255,255,255,0.5); text-align: right; text-transform: uppercase; }
        .bt-info b { color: #FFFF00; }

        /* GRID MAGAZINE */
        .bt-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .bt-card { 
            position: relative; background: #000; border: 1px solid rgba(255,255,255,0.12); 
            transition: 0.4s; text-decoration: none; color: inherit; overflow: hidden;
        }
        .w-60 { flex: 1 1 calc(60% - 10px); }
        .w-40 { flex: 1 1 calc(40% - 10px); }
        .w-50 { flex: 1 1 calc(50% - 10px); }

        .bt-thumb { aspect-ratio: 16/9; background-size: cover; background-position: center; transition: 0.6s; border-bottom: 1px solid rgba(255,255,255,0.12); }
        .bt-card:hover .bt-thumb { filter: grayscale(1) brightness(0.7); transform: scale(1.03); }
        .bt-card:hover { border-color: #FFFF00; }

        .bt-content { padding: 20px; }
        .bt-video-title { font-family: 'Monument Extended'; font-size: 18px; margin: 0 0 10px; text-transform: uppercase; }
        .tag-box { font-size: 8px; border: 1px solid rgba(255,255,255,0.1); padding: 3px 7px; margin-right: 5px; font-weight: 800; }

        /* LOADER IN BASSO AL CENTRO */
        #loader-wrap { width: 100%; display: flex; justify-content: center; padding: 60px 0 100px; }
        .loader { 
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid #FFFF00; border-radius: 50%; animation: spin 1s linear infinite; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) { .w-60, .w-40, .w-50 { flex: 1 1 100%; } }
    </style>
</head>
<body>

<div id="main-container">
    <header class="bt-header">
        <h1 class="bt-title">BLACKTOP</h1>
        <h1 class="bt-title bt-outline">SESSIONS</h1>
        <div class="bt-divider"></div>
        <p class="bt-editorial-text">
            THE UNDERGROUND <b>PHONK & WAVE</b> ARCHIVE. TRACKING THE EVOLUTION OF 
            <b>SYNTHWAVE</b> SESSIONS, <b>DRIFT PHONK</b> ENERGY AND GLOBAL <b>STREET AUDIO</b>.
        </p>
    </header>

    <div id="video-grid" class="bt-grid"></div>

    <div id="loader-wrap">
        <div class="loader"></div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyCzyvtdHpYvKnRT3iGNXY5UwFwYba6OyPk';
    const PLAYLIST_ID = 'PLOu--yZWWSogumQEMxLeEEtjIOT-7QAcW';

    async function loadVideos() {
        try {
            const r = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=12&playlistId=${PLAYLIST_ID}&key=${API_KEY}`);
            const d = await r.json();
            const container = document.getElementById('video-grid');
            
            d.items.forEach((item, i) => {
                const id = item.snippet.resourceId.videoId;
                const size = (i % 3 === 0) ? 'w-60' : (i % 3 === 1) ? 'w-40' : 'w-50';
                const card = document.createElement('a');
                card.className = `bt-card ${size}`;
                card.href = `https://www.youtube.com/watch?v=${id}`;
                card.target = '_blank';
                card.innerHTML = `
                    <div class="bt-thumb" style="background-image:url('https://i.ytimg.com/vi/${id}/mqdefault.jpg')"></div>
                    <div class="bt-content">
                        <h2 class="bt-video-title">${item.snippet.title}</h2>
                        <div><span class="tag-box">100 OTTANI</span><span class="tag-box">PHONK</span></div>
                    </div>`;
                container.appendChild(card);
            });
            document.getElementById('loader-wrap').style.display = 'none';
        } catch(e) { console.error(e); }
    }
    loadVideos();
</script>
</body>
</html>
