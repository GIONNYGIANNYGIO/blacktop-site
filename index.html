<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blacktop</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

#podcast-terminal-blacktop {
    --bt-neon: #FFFF00;
    --bt-white: #ffffff;
    --bt-border: rgba(255,255,255,0.12);
    background: transparent !important;
    color: var(--bt-white);
    padding-left: 30px;
    padding-right: 30px;
    font-family: 'JetBrains Mono', monospace;
}

@media (max-width:768px){
    #podcast-terminal-blacktop{
        padding-left:15px;
        padding-right:15px;
    }
}

.spinner {
    width:40px;
    height:40px;
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid #FFFF00;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.podcast-archive-grid {
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.pc-card {
    flex:1 1 calc(50% - 10px);
    background:#000;
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    text-decoration:none;
}

.pc-thumb {
    width:100%;
    aspect-ratio:16/9;
    background-size:cover;
    background-position:center;
}

.pc-content {
    padding:15px;
}

.pc-title {
    font-weight:800;
    font-size:14px;
}
</style>
</head>

<body style="margin:0; background:transparent;">

<div id="podcast-terminal-blacktop">

<div id="loader" style="display:flex; justify-content:center; align-items:center; height:300px;">
    <div class="spinner"></div>
</div>

<div id="dynamic-video-container" class="podcast-archive-grid"></div>

</div>

<script>
const PLAYLIST_ID = 'PLOu--yZWWSogumQEMxLeEEtjIOT-7QAcW';
const container = document.getElementById('dynamic-video-container');
const loader = document.getElementById('loader');

const rssUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=${PLAYLIST_ID}`;
const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

async function fetchVideos() {
    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();

        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(data.contents, "text/xml");
        const entries = xmlDoc.getElementsByTagName("entry");

        container.innerHTML = '';

        for (let i = 0; i < entries.length; i++) {
            const entry = entries[i];
            const title = entry.getElementsByTagName("title")[0].textContent;
            const videoId = entry.getElementsByTagName("yt:videoId")[0].textContent;

            const el = document.createElement("a");
            el.className = "pc-card";
            el.href = `https://www.youtube.com/watch?v=${videoId}`;
            el.target = "_blank";

            el.innerHTML = `
                <div class="pc-thumb" style="background-image:url('https://i.ytimg.com/vi/${videoId}/mqdefault.jpg')"></div>
                <div class="pc-content">
                    <div class="pc-title">${title}</div>
                </div>
            `;

            container.appendChild(el);
        }

    } catch (error) {
        container.innerHTML = "<p style='opacity:0.5'>Errore caricamento video</p>";
    }

    loader.style.display = "none";
}

fetchVideos();
</script>

</body>
</html>
