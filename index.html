<div id="outer-wrap">

    <div id="podcast-terminal-blacktop">
        
        <header class="bt-magazine-header">
            <div class="bt-brand-stack">
                <h1 class="bt-title-main">BLACKTOP</h1>
                <h1 class="bt-title-outline">SESSIONS</h1>
            </div>
            <div class="bt-full-divider"></div>
            <p class="bt-editorial-text">
                THE UNDERGROUND <b>PHONK & WAVE</b> ARCHIVE. POWERED BY <b>100 OTTANI PLEASE!™</b>
            </p>
        </header>

        <div id="dynamic-video-container" class="podcast-archive-grid"></div>

        <div id="loader-bottom">
            <div class="spinner"></div>
        </div>

    </div>

</div>

<script>
(function() {
    // CONFIGURAZIONE API
    const API_KEY = 'AIzaSyCzyvtdHpYvKnRT3iGNXY5UwFwYba6OyPk';
    const PLAYLIST_ID = 'PLOu--yZWWSogumQEMxLeEEtjIOT-7QAcW';
    
    const container = document.getElementById('dynamic-video-container');
    const loader = document.getElementById('loader-bottom');

    const seoVibe = [
        { genre:'PHONK', mood:'NOCTURNAL', tech:'HIGH-BASS', context:'DRIFT' },
        { genre:'WAVE', mood:'ATMOSPHERIC', tech:'SYNTH-DRIVEN', context:'NEON' },
        { genre:'DRIFT', mood:'RAW ENERGY', tech:'STREET AUDIO', context:'URBAN' },
        { genre:'DARK', mood:'IMMERSIVE', tech:'LOW-FI', context:'CYBER' }
    ];

    async function fetchVideos() {
        try {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=20&playlistId=${PLAYLIST_ID}&key=${API_KEY}`);
            const data = await response.json();
            
            if (!data.items) return;

            container.innerHTML = '';
            const structuredData = [];

            data.items.forEach((item, i) => {
                const videoId = item.snippet.resourceId.videoId;
                const title = item.snippet.title;
                const pubDateRaw = item.snippet.publishedAt;
                const pubDate = new Date(pubDateRaw).toLocaleDateString('it-IT');
                const vibe = seoVibe[i % seoVibe.length];

                // Descrizione dinamica per SEO
                const metaDesc = `Exclusive ${vibe.mood} ${vibe.genre} session driven by ${vibe.tech} textures and ${vibe.context} atmosphere.`;

                // Logica Classi Width (60/40/50)
                const sizeClass = (i % 3 === 0) ? 'w-60' : (i % 3 === 1) ? 'w-40' : 'w-50';

                const article = document.createElement('article');
                article.className = `pc-card ${sizeClass}`;
                article.innerHTML = `
                    <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">
                        <div class="pc-thumb-container">
                            <div class="pc-thumb" style="background-image:url('https://i.ytimg.com/vi/${videoId}/mqdefault.jpg')"></div>
                        </div>
                        <div class="pc-meta-strip">
                            <span>SERIAL: <b>${videoId}</b></span>
                            <span>DATE: <b>${pubDate}</b></span>
                        </div>
                        <div class="pc-content">
                            <h2 class="pc-title">${title}</h2>
                            <p class="pc-desc">${metaDesc}</p>
                            <div class="pc-tag-list">
                                <span class="tag-box">100 OTTANI</span>
                                <span class="tag-box">${vibe.genre}</span>
                                <span class="tag-box">${vibe.mood}</span>
                                <span class="tag-box">${vibe.tech}</span>
                            </div>
                            <div class="corner-arrow">
                                <svg viewBox="0 0 24 24" width="20" height="20"><line x1="7" y1="17" x2="17" y2="7" stroke="currentColor" stroke-width="2"/><polyline points="7 7 17 7 17 17" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                            </div>
                        </div>
                    </a>`;
                
                container.appendChild(article);

                structuredData.push({
                    "@context": "https://schema.org",
                    "@type": "VideoObject",
                    "name": title,
                    "description": metaDesc,
                    "thumbnailUrl": [`https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`],
                    "uploadDate": pubDateRaw,
                    "embedUrl": `https://www.youtube.com/embed/${videoId}`
                });
            });

            // Iniezione SEO
            const scriptSEO = document.createElement('script');
            scriptSEO.type = 'application/ld+json';
            scriptSEO.textContent = JSON.stringify(structuredData);
            document.head.appendChild(scriptSEO);

            // Nascondi Loader
            loader.style.display = 'none';

        } catch (error) {
            console.error("Errore caricamento video:", error);
        }
    }

    fetchVideos();
})();
</script>
