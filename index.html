<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blacktop</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

#podcast-terminal-blacktop {
    --bt-neon: #FFFF00;
    --bt-white: #ffffff;
    --bt-border: rgba(255, 255, 255, 0.12);
    display: flow-root;
    clear: both;
    background: transparent !important;
    color: var(--bt-white);
    padding-left: 30px;
    padding-right: 30px;
    margin: 0;
    font-family: 'JetBrains Mono', monospace !important;
    width: 100%;
}

@media (max-width:768px){
    #podcast-terminal-blacktop{
        padding-left:15px;
        padding-right:15px;
    }
}

.spinner {
    width:40px;
    height:40px;
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid #FFFF00;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.podcast-archive-grid {
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.pc-card {
    flex:1 1 calc(50% - 10px);
    background:#000;
    border:1px solid rgba(255,255,255,0.1);
    text-decoration:none;
    color:white;
}

.pc-thumb {
    width:100%;
    aspect-ratio:16/9;
    background-size:cover;
    background-position:center;
}

.pc-content{
    padding:15px;
}

.pc-title{
    font-weight:800;
    font-size:14px;
}
</style>
</head>

<body style="margin:0; background:transparent;">

<div id="podcast-terminal-blacktop">

<div id="loader" style="display:flex; justify-content:center; align-items:center; height:300px;">
    <div class="spinner"></div>
</div>

<div id="dynamic-video-container" class="podcast-archive-grid"></div>

</div>

<script>
const PLAYLIST_ID = "PLOu--yZWWSogumQEMxLeEEtjIOT-7QAcW";
const API_KEY = "AIzaSyDUMMY"; // ← NON serve davvero per fallback

const container = document.getElementById("dynamic-video-container");
const loader = document.getElementById("loader");

async function loadVideos() {
    try {
        // Metodo stabile: scraping JSON embedded YouTube (no proxy)
        const res = await fetch(`https://www.youtube.com/playlist?list=${PLAYLIST_ID}`);
        const text = await res.text();

        const jsonMatch = text.match(/ytInitialData = (.*?);<\/script>/);
        if(!jsonMatch) throw new Error("No data");

        const data = JSON.parse(jsonMatch[1]);

        const videos = [];
        const items = data.contents.twoColumnBrowseResultsRenderer.tabs[0]
            .tabRenderer.content.sectionListRenderer.contents[0]
            .itemSectionRenderer.contents[0]
            .playlistVideoListRenderer.contents;

        items.forEach(item=>{
            if(item.playlistVideoRenderer){
                const v = item.playlistVideoRenderer;
                videos.push({
                    id: v.videoId,
                    title: v.title.runs[0].text
                });
            }
        });

        renderVideos(videos);

    } catch(e) {
        // FALLBACK: embed playlist diretto (non si rompe mai)
        container.innerHTML = `
        <iframe width="100%" height="500"
        src="https://www.youtube.com/embed/videoseries?list=${PLAYLIST_ID}"
        frameborder="0" allowfullscreen></iframe>`;
    }

    loader.style.display = "none";
}

function renderVideos(videos){
    container.innerHTML = "";
    videos.forEach(v=>{
        const el = document.createElement("a");
        el.className="pc-card";
        el.href=`https://www.youtube.com/watch?v=${v.id}`;
        el.target="_blank";

        el.innerHTML=`
        <div class="pc-thumb" style="background-image:url('https://i.ytimg.com/vi/${v.id}/mqdefault.jpg')"></div>
        <div class="pc-content">
            <div class="pc-title">${v.title}</div>
        </div>`;

        container.appendChild(el);
    });
}

loadVideos();
</script>

</body>
</html>
